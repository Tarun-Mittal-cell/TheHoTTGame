name: Certus Compliance Gate

on:
  pull_request:
    branches: [main]

jobs:
  certus-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Certus
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm install -g @tar_9897/certus-ai

      - name: Run Certus Scan
        run: |
          certus scan . --no-clone --ai --output certus-report.json
          
          SCORE=$(node -e "const r=require('./certus-report.json'); console.log(r.grade?.score ?? r.score ?? 0)")
          CRITICAL=$(node -e "const r=require('./certus-report.json'); const f=r.findings||r.summary?.findings||[]; console.log(typeof f.critical==='number'?f.critical:f.filter?.(x=>x.severity==='critical')?.length??0)")
          
          echo "Score: $SCORE"
          echo "Critical findings: $CRITICAL"
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Certus blocked merge: $CRITICAL critical finding(s)"
            exit 1
          fi
          
          if [ "$SCORE" -lt 50 ]; then
            echo "::error::Certus blocked merge: compliance score $SCORE/100 (minimum 50)"
            exit 1
          fi
